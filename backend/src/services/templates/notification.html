<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #f4f5f7;
      font-family:
        -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="background-color: #f4f5f7; padding: 40px 0"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="600"
            cellpadding="0"
            cellspacing="0"
            style="
              background-color: #ffffff;
              border-radius: 8px;
              overflow: hidden;
              box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            "
          >
            <tr>
              <td
                style="
                  background: linear-gradient(135deg, #6366f1, #4f46e5);
                  padding: 24px 40px;
                  text-align: center;
                "
              >
                <h1
                  style="
                    color: #ffffff;
                    margin: 0;
                    font-size: 20px;
                    font-weight: 600;
                  "
                >
                  {{title}}
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding: 40px">
                <p
                  style="
                    font-size: 15px;
                    color: #6b7280;
                    line-height: 1.6;
                    margin: 0 0 24px;
                  "
                >
                  {{message}}
                </p>
                {{#if actionUrl}}
                <table
                  role="presentation"
                  cellpadding="0"
                  cellspacing="0"
                  style="margin: 0 0 24px"
                >
                  <tr>
                    <td
                      align="center"
                      style="
                        background: linear-gradient(135deg, #6366f1, #4f46e5);
                        border-radius: 6px;
                        padding: 12px 32px;
                      "
                    >
                      <a
                        href="{{actionUrl}}"
                        style="
                          color: #ffffff;
                          font-size: 15px;
                          font-weight: 600;
                          text-decoration: none;
                          display: inline-block;
                        "
                        >{{actionText}}</a
                      >
                    </td>
                  </tr>
                </table>
                {{/if}}
              </td>
            </tr>
            <tr>
              <td
                style="
                  background-color: #f9fafb;
                  padding: 20px 40px;
                  text-align: center;
                "
              >
                <p style="font-size: 12px; color: #9ca3af; margin: 0">
                  InternOps &bull; Internal Operations Platform
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
