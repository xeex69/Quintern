name: Quintern CI

on:
  push:
    branches:
      - main
      - master
      - 'feature/*'
      - 'release/*'
  pull_request:
    branches:
      - main
      - 'release/*'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: Test (Jest + migrations + build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: internops_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/internops_test
      JWT_ACCESS_SECRET: ci-test-access-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: ci-test-refresh-secret-do-not-use-in-prod
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
      AI_PROVIDER: heuristic
      LOG_LEVEL: warn

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Postgres not ready after 30s"
          exit 1

      - name: Run migrations
        run: cd backend && npm run migrate

      - name: Seed test data
        run: cd backend && npm run seed

      - name: Run Jest tests
        run: cd backend && npm test -- --forceExit --detectOpenHandles --runInBand

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint -- --max-warnings 999 || echo "::warning::Frontend has lint warnings (non-blocking)"

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload frontend dist
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
          if-no-files-found: warn

  smoke:
    name: Smoke (boots real backend)
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: internops_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Use 'test' so the env validator allows us to skip CSRF/JWT secrets
      # and the app runs in dev-lite mode (null Redis, no rate-limit etc.)
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/internops_smoke
      JWT_ACCESS_SECRET: smoke-test-access-secret-32-chars
      JWT_REFRESH_SECRET: smoke-test-refresh-secret-32-chars
      JWT_SECRET: smoke-test-secret
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
      AI_PROVIDER: heuristic
      LOG_LEVEL: warn
      RATE_LIMIT_DISABLED: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend (no dev)
        run: cd backend && npm ci --omit=dev

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -p 5432 -U postgres && exit 0
            sleep 1
          done
          exit 1

      - name: Run migrations on smoke DB
        run: cd backend && npm run migrate

      - name: Seed smoke DB (creates admin@internops.com / Admin@123)
        run: cd backend && npm run seed

      - name: Start backend in background
        run: |
          cd backend
          nohup node src/app.js > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid

      - name: Wait for /health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5000/health >/dev/null 2>&1; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Backend never came up"
          cat /tmp/backend.log
          exit 1

      - name: Smoke test endpoints
        run: |
          set -e
          echo "== /health =="
          curl -fsS http://localhost:5000/health
          echo
          echo "== /api/ready =="
          curl -fsS http://localhost:5000/api/ready
          echo
          echo "== POST /api/auth/login (admin) =="
          RESP=$(curl -fsS -H 'Content-Type: application/json' \
            -d '{"email":"admin@internops.com","password":"Admin@123"}' \
            http://localhost:5000/api/auth/login)
          TOK=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('accessToken',''))")
          test -n "$TOK" || { echo "::error::no access token in response: $RESP"; exit 1; }
          echo "Got JWT: ${TOK:0:32}..."
          echo "== GET /api/users/me =="
          curl -fsS -H "Authorization: Bearer $TOK" http://localhost:5000/api/users/me | head -c 200
          echo
          echo "✓ Smoke tests passed"

      - name: Tail backend log on failure
        if: failure()
        run: cat /tmp/backend.log

      - name: Stop backend
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill "$(cat /tmp/backend.pid)" 2>/dev/null || true
          fi
